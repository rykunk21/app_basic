name: Kanban Automation

# This workflow manages Kanban labels through the TDD cycle:
# backlog → red → green → refactor → done
# The project board is just a view of these labels.

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, converted_to_draft, ready_for_review, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  manage-kanban:
    runs-on: ubuntu-latest
    steps:
      - name: Add backlog issues to project
        if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'backlog')
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/users/rykunk21/projects/5
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}

      - name: 🔴 Red Phase - Work started (failing test written)
        if: github.event_name == 'pull_request' && github.event.action == 'converted_to_draft'
        run: |
          ISSUE_NUM=$(echo "${{ github.event.pull_request.body }}" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [ -n "$ISSUE_NUM" ]; then
            gh issue edit "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              --add-label "red" \
              --remove-label "backlog" \
              || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Green Phase - Tests passing (PR opened)
        if: github.event_name == 'pull_request' && github.event.action == 'opened' && !github.event.pull_request.draft
        run: |
          ISSUE_NUM=$(echo "${{ github.event.pull_request.body }}" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [ -n "$ISSUE_NUM" ]; then
            gh issue edit "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              --add-label "green" \
              --remove-label "red" \
              || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔵 Refactor Phase - Ready for review
        if: github.event_name == 'pull_request' && github.event.action == 'ready_for_review'
        run: |
          ISSUE_NUM=$(echo "${{ github.event.pull_request.body }}" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [ -n "$ISSUE_NUM" ]; then
            gh issue edit "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              --add-label "refactor" \
              --remove-label "green" \
              || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Done Phase - PR merged
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        run: |
          ISSUE_NUM=$(echo "${{ github.event.pull_request.body }}" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [ -n "$ISSUE_NUM" ]; then
            gh issue edit "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              --add-label "done" \
              --remove-label "refactor" \
              || true
            gh issue close "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}